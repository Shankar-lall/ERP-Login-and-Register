<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your email and we'll send a reset link.</p>
    <div id="forgot-msg" class="msg hidden"></div>

    <label>Email Address
      <input type="email" id="forgot-email" placeholder="your.email@university.edu">
    </label>

    <button class="btn-primary" onclick="handleForgot()">Send Reset Link</button>
    <div class="links">
      <a href="login.html">← Back to login</a>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
